<h2>AI API 管理界面布局</h2>
<p class="subtitle">选择侧边栏的导航布局</p>

<div class="options">
  <div class="option" data-choice="single" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>单列表布局</h3>
      <p>左侧 API 列表，点击后在右侧显示详情和配置</p>
    </div>
  </div>
  <div class="option" data-choice="card" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>卡片网格布局</h3>
      <p>以卡片形式展示所有 API 提供商一目了然</p>
    </div>
  </div>
  <div class="option" data-choice="table" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>表格+抽屉布局</h3>
      <p>表格展示 API 列表，侧边抽屉显示配置详情</p>
    </div>
  </div>
</div>
